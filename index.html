<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>减脂计划 · 78→70kg</title>
    <style>
        /* 保持你原来的样式不变 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        :root{--bg:#F7F6F2; --bg2:#FFFFFF; --text:#1A1A18; --teal:#1D9E75; --teal-light:#E1F5EE; --border:rgba(0,0,0,0.1);}
        body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
        .header{background:var(--bg2);padding:1rem;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
        .container{max-width:760px;margin:0 auto;padding:1rem;}
        .card{background:#fff;border-radius:12px;padding:1rem;margin-bottom:1rem;border:1px solid #eee;}
        .day-cell{border:1px solid #eee;border-radius:8px;padding:10px;text-align:center;cursor:pointer;}
        .day-cell.done{background:var(--teal-light);border-color:var(--teal);}
        .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
        .tabs{display:flex;gap:10px;margin-bottom:1rem;}
        .tab{padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;}
        .tab.active{background:var(--teal);color:#fff;border-color:var(--teal);}
        .panel{display:none;}.panel.active{display:block;}
    </style>
</head>
<body>
    <div class="header">
        <h1>减脂计划 <span id="sync-status" style="font-size:12px;font-weight:normal;color:#999;">初始化...</span></h1>
    </div>
    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('checkin')">打卡积分</button>
            <button class="tab" onclick="switchTab('weight')">体重记录</button>
        </div>

        <div id="tab-checkin" class="panel active">
            <div class="card">
                <div id="stats" style="margin-bottom:10px;font-weight:bold;">总积分: 0 | 已打卡: 0 天</div>
                <div class="week-grid" id="calendar-grid"></div>
            </div>
            <div class="card">
                <h3>蛋白质计算器</h3>
                <input type="number" id="prot-input" placeholder="输入蛋白质(g)" style="padding:5px;width:100px;">
                <button onclick="addProt()" style="padding:5px 15px;">添加</button>
                <div id="prot-val" style="margin-top:10px;">今日已摄入: 0g</div>
            </div>
        </div>

        <div id="tab-weight" class="panel">
            <div class="card" id="weight-list">
                </div>
        </div>
    </div>

    <script>
        // 1. 【核心数据】硬编码 15-21 号记录，解决丢失问题
        let data = {
            "2026-04-15":{"ex":true,"diet":[true,true,true,true]},
            "2026-04-16":{"ex":true,"diet":[true,true,true,true]},
            "2026-04-17":{"ex":true,"diet":[true,true,true,true]},
            "2026-04-18":{"ex":true,"diet":[true,true,true,false]},
            "2026-04-19":{"ex":true,"diet":[true,true,true,true]},
            "2026-04-20":{"ex":true,"diet":[true,true,true,true]},
            "2026-04-21":{"ex":true,"diet":[true,true,true,true]}
        };
        let weightData = {"2026-04-21":78.35, "2026-04-22":78.1};

        function switchTab(t){
            document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(p=>p.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            event.target.classList.add('active');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            // 简单渲染 15-22 号
            for(let i=15; i<=22; i++) {
                const date = `2026-04-${i}`;
                const isDone = data[date] ? 'done' : '';
                grid.innerHTML += `<div class="day-cell ${isDone}" onclick="toggle('${date}')">4/${i}</div>`;
            }
            updateStats();
        }

        function toggle(date) {
            if(!data[date]) data[date] = {"ex":true,"diet":[true,true,true,true]};
            else delete data[date];
            renderCalendar();
            save();
        }

        function updateStats() {
            const days = Object.keys(data).length;
            document.getElementById('stats').innerText = `总积分: ${days*3} | 已打卡: ${days} 天`;
        }

        function addProt() {
            const val = document.getElementById('prot-input').value;
            document.getElementById('prot-val').innerText = `今日已摄入: ${val}g`;
            save();
        }

        async function save() {
            const status = document.getElementById('sync-status');
            status.innerText = "同步中...";
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    body: JSON.stringify({ checkin: data, weightByDate: weightData })
                });
                status.innerText = "同步完成 ✓";
            } catch (e) {
                status.innerText = "本地保存";
            }
        }

        // 初始化
        window.onload = () => {
            renderCalendar();
            document.getElementById('sync-status').innerText = "已就绪";
            // 自动尝试同步一次
            save();
        };
    </script>
</body>
</html>
