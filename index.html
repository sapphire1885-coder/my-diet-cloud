<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的云端减脂计划</title>
    <style>
        /* 保持你原来的样式不变... */
    </style>
</head>
<body>
    <script>
        // --- 核心改动：云端保存逻辑 ---
        async function saveAll() {
            // 先保存在浏览器本地（双重保险）
            localStorage.setItem('plan3m', JSON.stringify(data));
            localStorage.setItem('weightByDate', JSON.stringify(weightData));

            // 发送到 Vercel 云端数据库
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    body: JSON.stringify({
                        data: data,
                        weightData: weightData,
                        updatedAt: new Date().toISOString()
                    })
                });
                console.log('云端同步成功');
            } catch (e) {
                console.error('云端同步失败', e);
            }
        }

        // 修改你原来的 save() 和 saveWeight() 函数，让它们都调用 saveAll()
        function save() { saveAll(); }
        function saveWeight(k, v) {
            if (v === null || isNaN(v)) { delete weightData[k]; } 
            else { weightData[k] = v; }
            saveAll();
        }

        // --- 保持你原来的渲染逻辑 ---
        // (这里继续使用你代码里现有的 renderCalendar, updateStats 等函数)
    </script>
</body>
</html>
