<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>减脂计划 · 78→70kg (云端版)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#F7F6F2; --bg2:#FFFFFF; --bg3:#F0EEE8; --text:#1A1A18; --text2:#6B6A64;
    --text3:#9A9890; --border:rgba(0,0,0,0.1); --border2:rgba(0,0,0,0.06);
    --teal:#1D9E75; --teal-light:#E1F5EE; --teal-mid:#9FE1CB; --teal-dark:#085041;
    --amber:#EF9F27; --amber-light:#FAEEDA; --amber-dark:#633806;
    --blue:#378ADD; --blue-light:#E6F1FB; --blue-dark:#185FA5;
    --coral:#D85A30; --coral-light:#FAECE7; --coral-dark:#712B13;
    --pink-light:#FBEAF0; --pink-dark:#72243E; --red:#E24B4A;
  }
  body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}
  .header{background:var(--bg2);border-bottom:1px solid var(--border2);padding:1.25rem 1.5rem;position:sticky;top:0;z-index:100;}
  .header-inner{max-width:760px;margin:0 auto;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
  .header h1{font-size:18px;font-weight:700;color:var(--text);}
  .container{max-width:760px;margin:0 auto;padding:1.25rem 1rem 3rem;}
  .tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
  .tab{border:1px solid var(--border);border-radius:8px;padding:7px 16px;font-size:13px;color:var(--text2);background:var(--bg2);cursor:pointer;transition:all 0.15s;font-family:inherit;}
  .tab.active{background:var(--teal-light);border-color:var(--teal-mid);color:var(--teal-dark);font-weight:500;}
  .panel{display:none;}.panel.active{display:block;}
  .card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:1rem 1.25rem;margin-bottom:0.625rem;}
  .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--border2);}
  .row:last-child{border-bottom:none;}
  .rl{font-size:13px;color:var(--text2);min-width:68px;flex-shrink:0;}
  .rv{font-size:13px;color:var(--text);text-align:right;flex:1;line-height:1.55;}
  .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:5px;margin-left:5px;font-weight:500;}
  .bt{background:var(--teal-light);color:var(--teal-dark);}
  .ba{background:var(--amber-light);color:var(--amber-dark);}
  .bb{background:var(--blue-light);color:var(--blue-dark);}
  .info-box{background:var(--teal-light);border-radius:10px;padding:0.875rem 1rem;font-size:13px;color:var(--teal-dark);line-height:1.7;margin-bottom:0.625rem;}
  .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:0.875rem;}
  .mc{background:var(--bg3);border-radius:10px;padding:0.875rem 1rem;}
  .mv{font-size:22px;font-weight:700;}
  .prog-bg{background:var(--bg3);border-radius:4px;height:8px;}
  .prog-fill{height:8px;border-radius:4px;background:var(--teal);transition:width 0.3s;}
  canvas{display:block;width:100%;height:auto;}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <h1>减脂计划 <span id="sync-status" style="font-size:10px; font-weight:normal; background:#eee; padding:2px 6px; border-radius:4px; margin-left:10px;">连接中...</span></h1>
  </div>
</div>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('diet')">饮食计划</button>
    <button class="tab" onclick="switchTab('workout')">运动计划</button>
    <button class="tab" onclick="switchTab('checkin')">打卡积分</button>
    <button class="tab" onclick="switchTab('weight')">体重记录</button>
  </div>

  <div id="tab-diet" class="panel active">
    <div class="info-box">核心原则：不算卡路里，用「食物结构」控制摄入。</div>
    <div class="sub">平日（2顿）</div>
    <div class="card">
      <div class="row"><div class="rl">早餐</div><div class="rv">鸡蛋2个 + 豆浆/牛奶 + 少量全麦面包或燕麦<span class="badge bt">高蛋白</span></div></div>
      <div class="row"><div class="rl">晚餐</div><div class="rv">一掌蛋白质（鱼/鸡/豆腐）+ 一拳蔬菜 + 主食减半<span class="badge ba">控碳水</span></div></div>
    </div>
    <div class="sub">周末自由餐</div>
    <div class="card">
      <div class="row"><div class="rl">周六晚饭</div><div class="rv">正式自由餐 — 想吃什么吃什么，不用愧疚<span class="badge bt">每周1次</span></div></div>
    </div>
  </div>

  <div id="tab-workout" class="panel">
    <div class="info-box">目标：全身塑形 · 提臀 · 减脂到70kg。哑铃统一10lb。</div>
    <div class="card">
        <div class="row"><div class="rl">力量训练</div><div class="rv">每周3次，A→B→C 循环</div></div>
    </div>
  </div>

  <div id="tab-checkin" class="panel">
    <div class="metric-grid">
      <div class="mc"><div class="ml">总积分</div><div class="mv" id="pts-display">0</div></div>
      <div class="mc"><div class="ml">已打卡</div><div class="mv"><span id="total-done">0</span> 天</div></div>
      <div class="mc"><div class="ml">今日蛋白质</div><div class="mv"><span id="today-prot">0</span> g</div></div>
    </div>
    <div id="month-tabs" style="display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;"></div>
    <div id="calendar-body"></div>
    <div class="sub">积分进度</div>
    <div class="prog-row" style="display:flex;align-items:center;gap:10px;margin:10px 0;">
        <div style="flex:1" class="prog-bg"><div id="p3" class="prog-fill" style="width:0%"></div></div>
        <div id="pv3" style="font-size:12px;">0/80</div>
    </div>
  </div>

  <div id="tab-weight" class="panel">
    <div class="metric-grid">
      <div class="mc"><div class="ml">起始体重</div><div class="mv">78 kg</div></div>
      <div class="mc"><div class="ml">目标体重</div><div class="mv">70 kg</div></div>
      <div class="mc"><div class="ml">已减去</div><div class="mv"><span id="weight-lost">0</span> kg</div></div>
    </div>
    <div class="card">
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <input type="date" id="weight-date-picker" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" step="0.1" id="weight-value-input" placeholder="kg" style="width:80px; padding:8px; border:1px solid #ddd; border-radius:8px;">
      </div>
      <button onclick="saveWeightEntry()" style="width:100%; padding:10px; background:var(--teal); color:white; border:none; border-radius:8px;">保存到云端</button>
      <div id="weight-save-status" style="font-size:12px; text-align:center; margin-top:5px;"></div>
    </div>
    <div id="weight-history" style="margin-top:20px;"></div>
    <div class="sub">趋势图</div>
    <canvas id="weight-chart" width="600" height="220"></canvas>
  </div>
</div>

<script>
// --- 全能同步逻辑 ---
var START = new Date(2026,3,15);
var END   = new Date(2026,6,14);
var DIET_ITEMS=['蛋白质每餐有','主食减半/控量','水果只吃1份','喝够2.5L水'];
var WK_TYPES=['力量','轻走','羽毛球','轻走','力量','自由餐','休息'];
var WK_PTS  =[3,1,2,1,3,0,1];
var WK_NAMES=['周一','周二','周三','周四','周五','周六','周日'];

var data = {};
var weightData = {};

async function init() {
  const status = document.getElementById('sync-status');
  try {
    const res = await fetch('/api/save');
    const cloud = await res.json();
    if (cloud.checkin) data = cloud.checkin;
    if (cloud.weightByDate) weightData = cloud.weightByDate;
    status.innerText = "同步完成 ✓";
    status.style.background = "#E1F5EE";
    status.style.color = "#1D9E75";
  } catch (e) {
    status.innerText = "离线模式";
  }
  renderCalendar();
  initWeightTab();
  updateStats();
}

async function saveAll() {
  localStorage.setItem('plan3m', JSON.stringify(data));
  localStorage.setItem('weightByDate', JSON.stringify(weightData));
  try {
    await fetch('/api/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ checkin: data, weightByDate: weightData })
    });
  } catch (e) { console.error("同步失败", e); }
}

function save() { saveAll(); }
function saveWeight(k,v){
  if(v===null||isNaN(v)){delete weightData[k];}
  else{weightData[k]=v;}
  saveAll();
}

function dateKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function dayOfWeek(d){return (d.getDay()+6)%7;}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='weight') initWeightTab();
}

function renderCalendar(){
  var body=document.getElementById('calendar-body');
  body.innerHTML = '<p style="font-size:12px; color:#666; text-align:center;">日历已就绪</p>';
}

function initWeightTab(){
  var today=new Date();
  document.getElementById('weight-date-picker').valueAsDate = today;
  renderWeightHistory();
  updateWeightLost();
}

function saveWeightEntry(){
  var d = document.getElementById('weight-date-picker').value;
  var v = parseFloat(document.getElementById('weight-value-input').value);
  if(!d || isNaN(v)) return alert("请完整填写日期和体重");
  var k = d.split('-').map(s => parseInt(s)).join('-');
  saveWeight(k, v);
  initWeightTab();
  document.getElementById('weight-save-status').innerText = "同步成功 ✓";
}

function updateWeightLost(){
  var keys=Object.keys(weightData).sort();
  if(!keys.length) return;
  var latest = weightData[keys[keys.length-1]];
  document.getElementById('weight-lost').textContent = (78 - latest).toFixed(1);
}

function renderWeightHistory(){
  var h = document.getElementById('weight-history');
  h.innerHTML = Object.keys(weightData).reverse().map(k => `
    <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;">
      <span>${k}</span> <b>${weightData[k]} kg</b>
    </div>
  `).join('');
}

function updateStats(){
  var totalPts=0, totalDone=0;
  Object.keys(data).forEach(k => {
    if(data[k].ex) totalPts += 3;
    totalDone++;
  });
  document.getElementById('pts-display').textContent = totalPts;
  document.getElementById('total-done').textContent = totalDone;
  document.getElementById('p3').style.width = Math.min(100, totalPts/80*100) + '%';
  document.getElementById('pv3').textContent = totalPts + '/80';
}

window.onload = init;
</script>
</body>
</html>
