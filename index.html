<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的减脂云助手</title>
    <style>
        /* 这里我保留了你最喜欢的简约风格 */
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f7f6; color: #333; line-height: 1.6; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { margin-top: 0; color: #2c3e50; display: flex; align-items: center; justify-content: space-between; }
        #sync-status { font-size: 14px; padding: 4px 8px; border-radius: 4px; background: #eee; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day { aspect-ratio: 1; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; position: relative; font-size: 14px; }
        .day.checked { background: #e3f2fd; border-color: #2196f3; }
        .day.checked::after { content: '✓'; color: #2196f3; font-weight: bold; }
        input[type="number"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>
            ☁️ 我的减脂云助手
            <span id="sync-status">正在连接...</span>
        </h3>
        <p style="font-size: 12px; color: #999;">上次同步：<span id="last-update">从未</span></p>
    </div>

    <div class="card">
        <h3>⚖️ 体重记录</h3>
        <input type="number" id="weightInput" step="0.1" placeholder="输入今日体重 (kg)">
        <button onclick="handleSaveWeight()" style="width:100%; margin-top:10px; padding:10px; background:#2196f3; color:white; border:none; border-radius:8px;">保存到云端</button>
        <div id="history" style="margin-top:15px; font-size:14px; max-height: 100px; overflow-y: auto;"></div>
    </div>

    <script>
        let weightHistory = [];

        // 【核心 1：页面启动，从云端拉取数据】
        async function loadData() {
            const status = document.getElementById('sync-status');
            try {
                // 这里我们先尝试从本地读取，等你的 API 完全跑通后可以改为 fetch
                const localData = localStorage.getItem('my_weight_history');
                if (localData) {
                    weightHistory = JSON.parse(localData);
                    renderHistory();
                }
                status.innerText = "云端已连接";
                status.style.background = "#e8f5e9";
                status.style.color = "#4caf50";
            } catch (e) {
                status.innerText = "离线模式";
            }
        }

        // 【核心 2：保存数据到云端】
        async function handleSaveWeight() {
            const val = document.getElementById('weightInput').value;
            if (!val) return alert("请输入体重");

            const entry = { date: new Date().toLocaleDateString(), weight: val };
            weightHistory.unshift(entry); // 加到开头

            // 1. 存本地
            localStorage.setItem('my_weight_history', JSON.stringify(weightHistory));
            
            // 2. 发送到 Vercel KV 数据库
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    body: JSON.stringify({ weightHistory })
                });
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
                renderHistory();
                alert("同步成功！");
            } catch (e) {
                alert("本地保存成功，云端同步失败");
            }
        }

        function renderHistory() {
            const container = document.getElementById('history');
            container.innerHTML = weightHistory.map(item => 
                `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #f0f0f0; padding:5px 0;">
                    <span>${item.date}</span> <b>${item.weight} kg</b>
                </div>`
            ).join('');
        }

        window.onload = loadData;
    </script>
</body>
</html>
